<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 작은 소라게 키우기</title>
  <meta name="description" content="귀여운 소라게를 키우며 힐링하세요. 무료 다운로드.">

  <!-- Open Graph (카톡 링크 미리보기에도 사용됨) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="나의 작은 소라게 키우기">
  <meta property="og:description" content="귀여운 소라게를 키우며 힐링하세요.">
  <meta property="og:image" content="https://kanghunw-dotcom.github.io/promo/assets/img/preview1.png">
  <meta property="og:url" content="https://kanghunw-dotcom.github.io/promo/">

  <link rel="icon" href="assets/img/logo.png">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- ===== Hero ===== -->
  <header class="hero">
    <img src="assets/img/logo_vertical.png" alt="나의 작은 소라게 키우기" class="hero-logo">
    <h1 class="hero-title">나의 작은 소라게 키우기</h1>
    <p class="hero-tagline">손바닥 위의 작은 친구, 오늘부터 함께해요.</p>

    <div class="cta-row">
      <a class="btn btn-primary"
         href="https://play.google.com/store/apps/details?id=com.kanghun.hermitcrab"
         target="_blank" rel="noopener">
        <span class="btn-icon">▶</span> Google Play 다운로드
      </a>
      <button class="btn btn-kakao" id="kakaoShareBtn" type="button">
        <span class="btn-icon">💬</span> 카톡으로 공유
      </button>
    </div>
  </header>

  <!-- ===== Intro Video ===== -->
  <section class="section">
    <h2 class="section-title">소개 영상</h2>
    <div class="video-wrap">
      <video controls preload="metadata" poster="assets/img/preview1.png">
        <source src="assets/video/intro.mp4" type="video/mp4">
        브라우저가 영상을 지원하지 않습니다.
      </video>
    </div>
  </section>

  <!-- ===== Screenshot Gallery ===== -->
  <section class="section">
    <h2 class="section-title">스크린샷</h2>
    <div class="gallery">
      <figure class="gallery-item">
        <img src="assets/img/preview1.png" alt="소라게 키우기 화면 1">
      </figure>
      <figure class="gallery-item">
        <img src="assets/img/preview2.png" alt="소라게 키우기 화면 2">
      </figure>
    </div>
  </section>

  <!-- ===== Footer ===== -->
  <footer class="footer">
    <p>© Two in Soft · <a href="../privacy_policy.html">개인정보 처리방침</a></p>
  </footer>

  <!-- Kakao SDK -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
          integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
          crossorigin="anonymous"></script>
  <script src="assets/js/kakao-share.js"></script>
</body>
</html>
